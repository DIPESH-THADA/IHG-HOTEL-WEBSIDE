<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grocery List</title>
    <link rel="stylesheet" href="./style.css">
    <link rel="stylesheet" href="./cart.css">
    <link rel="icon" type="image/x-icon" href="./items-image/grocery-logo.png">
    <link rel="shortcut icon" type="image/png" href="./items-image/grocery-logo.png" />
    <!-- Font and icons links here -->
    <link rel="stylesheet" href="https://unicons.iconscout.com/release/v4.2.0/css/line.css">
</head>

<body>
    <!-- Navbar -->
    <header>
        <nav>
            <div class="logo">
                <img src="./items-image/grocery-logo.png" alt="grocery-logo" class="logo-img">
                <h2>Your List Items</h2>
            </div>
            <ul class="nav-links">
                <i class="uil uil-refresh"></i>
                <a href="index.html"><i class="uil uil-home"></i></a>
            </ul>

        </nav>
    </header>

    <!-- Main Content -->
    <main>
        <section class="cart-container">
            <h2>Your Shopping Cart</h2>
            <div class="cart-items" id="cart-items">
                <!-- Cart items will be dynamically inserted here -->
            </div>
            <div class="cart-total">
                <h3>Total: $<span id="cart-total">0.00</span></h3>
            </div>
        </section>
    </main>

    <!-- Footer -->
    <footer>
        <div class="footer">
            <p>&copy; <span id="current-year"></span> Grocery List. All rights reserved.</p>
        </div>
    </footer>

    <script src="./script.js"></script>
</body>

</html>
